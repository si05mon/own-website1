<!DOCTYPE html>
<html lang="de">
<!-- HOME -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Willkommen!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: white;
            min-height: 100vh;
            background: linear-gradient(rgba(20, 40, 80, 0.5), rgba(30, 60, 110, 0.8)),
                        url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4') center/cover no-repeat fixed;
            background-attachment: fixed;
            position: relative;
        }

        header {
            padding: 2rem 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -2px;
            color: white;
            text-decoration: none;
            text-shadow: 0 3px 12px rgba(0,0,0,0.5);
        }

        .hero {
            text-align: center;
            padding: 16vh 5% 12vh;
        }

        .hero h1 {
            font-size: 4.8rem;
            margin-bottom: 1rem;
            font-weight: 600;
            text-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }

        .hero p {
            font-size: 1.45rem;
            max-width: 620px;
            margin: 0 auto;
            opacity: 0.95;
            text-shadow: 0 3px 12px rgba(0,0,0,0.5);
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 2.2rem;
            flex-wrap: wrap;
            padding: 25rem 5% 6rem;
        }

        .btn {
            padding: 1.25rem 3.2rem;
            font-size: 1.15rem;
            font-weight: 600;
            border: 2px solid rgba(255,255,255,0.95);
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            color: white;
            text-decoration: none;
            transition: all 0.35s ease;
            backdrop-filter: blur(12px);
            min-width: 230px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .btn:hover {
            background: white;
            color: #1a2e5c09;
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        footer {
            text-align: center;
            padding-top: 12rem;
            opacity: 0.85;
            font-size: 0.95rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.6);
        }
    </style>
</head>
<body>
    <header>
        <a href="#" class="logo">Simon</a>
    </header> 

    <div class="buttons">
        <a href="projects/paolina/index.html" class="btn">Projekt 1</a>
        <a href="#" class="btn">Projekt 2</a>
        <a href="#" class="btn">Projekt 3</a>
    </div>

    <footer>
        &copy; 2026 Simon • Alle Rechte vorbehalten.
    </footer>
</body>
</html>
